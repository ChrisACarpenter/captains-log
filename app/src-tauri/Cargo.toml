[package]
name = "captainslog"
version = "0.1.0"
description = "Weekly work journal that makes self-reviews painless"
authors = ["Chris Carpenter"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix avoids a name collision between the binary and the library on Windows.
# See https://github.com/rust-lang/cargo/issues/8519
name = "captainslog_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.52.3", features = ["fs", "rt", "macros", "time"] }
async-trait = "0.1.89"
thiserror = "2.0.18"
chrono = { version = "0.4.45", features = ["serde"] }
image = { version = "0.25.10", default-features = false, features = ["png"] }
tauri-plugin-dialog = "2.7.1"
tauri-plugin-notification = "2.3.3"
tauri-plugin-window-state = "2"

[target.'cfg(target_os = "macos")'.dependencies]
# Native macOS notification API — gives us action buttons (the cross-platform
# tauri-plugin-notification gates those behind #[cfg(mobile)] for desktop).
# Used by reminders::fire_notification on macOS only.
mac-notification-sys = "0.6"

[dev-dependencies]
tempfile = "3.27.0"

