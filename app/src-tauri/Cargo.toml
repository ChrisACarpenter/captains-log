[package]
name = "captainslog"
version = "0.1.0"
description = "Weekly work journal that makes self-reviews painless"
authors = ["Chris Carpenter"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix avoids a name collision between the binary and the library on Windows.
# See https://github.com/rust-lang/cargo/issues/8519
name = "captainslog_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.52.3", features = ["fs", "rt", "macros"] }
async-trait = "0.1.89"
thiserror = "2.0.18"
chrono = { version = "0.4.45", features = ["serde"] }

[dev-dependencies]
tempfile = "3.27.0"

